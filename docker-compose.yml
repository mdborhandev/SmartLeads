version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: contactmanager_db
    environment:
      POSTGRES_DB: contactmanager
      POSTGRES_USER: cm_user
      POSTGRES_PASSWORD: cm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
